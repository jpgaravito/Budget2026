<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta http-equiv="refresh" content="1800">
<title>2026 Budget - Board Briefing</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0/dist/chartjs-plugin-datalabels.min.js"></script>
<style>
  :root{
    /* Habi brand - purples */
    --p-100:#dbc5fa;  /* bright / soft fills */
    --p-400:#a566f7;  /* light / accents */
    --p-700:#6825cd;  /* night / primary */
    --p-900:#4b1a8b;  /* dark / text accents */
    /* Country accents */
    --col:#eab308;    /* Colombia yellow */
    --col-soft:#fef9c3;
    --mex:#16a34a;    /* Mexico green */
    --mex-soft:#dcfce7;
    /* Neutrals */
    --ink:#0f172a; --ink2:#334155; --muted:#64748b; --line:#e2e8f0;
    --good:#059669; --good-soft:#ecfdf5;
    --bad:#dc2626;  --bad-soft:#fef2f2;
    --warn:#b45309; --warn-soft:#fffbeb;
    --bg:#ffffff;   --bg-soft:#f8fafc;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:#f1f5f9;color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Inter,Roboto,Helvetica,Arial,sans-serif;
    font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;}
  .page{max-width:1200px;margin:0 auto;background:var(--bg);
    box-shadow:0 1px 2px rgba(15,23,42,.06),0 10px 30px rgba(15,23,42,.08);min-height:100vh;}

  /* Cover */
  header.cover{padding:40px 56px 34px;
    background:linear-gradient(135deg,#4b1a8b 0%,#6825cd 50%,#a566f7 100%);color:#fff;}
  header.cover .eyebrow{opacity:.85;letter-spacing:.18em;text-transform:uppercase;font-size:11px;font-weight:600;}
  header.cover h1{font-size:30px;margin:10px 0 4px;font-weight:700;line-height:1.15;letter-spacing:-.01em;}
  header.cover .sub{opacity:.92;font-size:14px;max-width:820px;}
  header.cover .meta{margin-top:22px;display:flex;gap:28px;font-size:12px;opacity:.9;flex-wrap:wrap;}
  header.cover .meta span strong{display:block;font-size:10px;opacity:.75;text-transform:uppercase;letter-spacing:.1em;margin-bottom:3px;font-weight:500}

  /* Tab nav - sticky */
  nav.tabs{position:sticky;top:0;z-index:20;background:#fff;border-bottom:1px solid var(--line);
    display:flex;flex-wrap:wrap;padding:0 56px;box-shadow:0 2px 8px rgba(15,23,42,.04);}
  nav.tabs button{appearance:none;background:none;border:none;padding:14px 16px;cursor:pointer;
    font-size:12.5px;font-weight:600;color:var(--ink2);letter-spacing:.02em;
    border-bottom:3px solid transparent;transition:all .15s;font-family:inherit;}
  nav.tabs button:hover{color:var(--p-700);background:#fafafa;}
  nav.tabs button.active{color:var(--p-700);border-bottom-color:var(--p-700);background:#faf7ff;}
  nav.tabs button .num{display:inline-block;font-size:10px;opacity:.55;margin-right:6px;font-weight:500;}

  /* Panels */
  main{padding:0}
  .panel{padding:32px 56px 48px;display:none;}
  .panel.active{display:block;}
  .panel h2{font-size:22px;margin:0 0 4px;color:var(--ink);font-weight:700;letter-spacing:-.01em;}
  .panel .lede{font-size:14.5px;color:var(--ink2);margin:4px 0 22px;max-width:920px;}
  h3{font-size:13px;margin:24px 0 10px;color:var(--p-900);font-weight:700;text-transform:uppercase;letter-spacing:.08em;}
  h4{font-size:13.5px;margin:18px 0 8px;color:var(--ink);font-weight:700;}
  p{margin:8px 0;color:var(--ink2)}

  /* KPI cards */
  .kpis{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin:0 0 18px;}
  .kpis.three{grid-template-columns:repeat(3,1fr);}
  .kpis.five{grid-template-columns:repeat(5,1fr);}
  .kpi{background:var(--bg-soft);border:1px solid var(--line);border-radius:10px;padding:14px 16px;}
  .kpi .label{font-size:10.5px;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);font-weight:600;}
  .kpi .v{font-size:22px;font-weight:700;color:var(--ink);margin:6px 0 2px;letter-spacing:-.02em}
  .kpi .delta{font-size:11.5px;color:var(--muted)}
  .kpi .delta.up{color:var(--good)}
  .kpi .delta.down{color:var(--bad)}
  .kpi.featured{background:linear-gradient(135deg,#faf5ff 0%,#f3e8ff 100%);border-color:var(--p-100)}
  .kpi.featured .v{color:var(--p-700)}
  .kpi.col{border-left:3px solid var(--col)}
  .kpi.mex{border-left:3px solid var(--mex)}

  /* Tables */
  table.fin{width:100%;border-collapse:collapse;font-variant-numeric:tabular-nums;font-size:12.5px;margin:8px 0 14px;}
  table.fin th,table.fin td{padding:8px 11px;text-align:right;border-bottom:1px solid var(--line);}
  table.fin th:first-child,table.fin td:first-child{text-align:left;font-weight:500;color:var(--ink2)}
  table.fin thead th{background:var(--bg-soft);font-weight:600;color:var(--ink2);font-size:10.5px;text-transform:uppercase;letter-spacing:.06em;border-bottom:2px solid var(--line);}
  table.fin tr.sub td:first-child{padding-left:24px;color:var(--muted);font-weight:400}
  table.fin tr.total td{font-weight:700;color:var(--ink);border-top:1.5px solid var(--p-700);background:#faf7ff;}
  table.fin tr.hl td{font-weight:700;color:var(--ink);background:#f8fafc;}
  table.fin td.pos{color:var(--good)}
  table.fin td.neg{color:var(--bad)}
  table.fin tr.section-head td{background:var(--p-100);color:var(--p-900);font-weight:700;text-transform:uppercase;font-size:10.5px;letter-spacing:.08em}
  table.fin tr.subsection-head td{background:#faf7ff;color:var(--p-900);font-weight:600;font-size:12px;padding:6px 10px}
  table.fin tr.country-head td{background:#f7f4fc;color:var(--p-700);font-weight:600;font-size:11.5px;padding:5px 10px;padding-left:20px}

  /* Callouts */
  .callout{border-left:3px solid var(--p-700);background:#faf7ff;padding:12px 16px;border-radius:0 8px 8px 0;margin:14px 0;font-size:13px;}
  .callout.good{border-color:var(--good);background:var(--good-soft)}
  .callout.warn{border-color:var(--warn);background:var(--warn-soft)}
  .callout.bad{border-color:var(--bad);background:var(--bad-soft)}
  .callout.col{border-color:var(--col);background:var(--col-soft)}
  .callout.mex{border-color:var(--mex);background:var(--mex-soft)}
  .callout strong{color:var(--ink)}

  /* Two-col layout */
  .two{display:grid;grid-template-columns:1fr 1fr;gap:22px;align-items:start}
  .two-1-2{display:grid;grid-template-columns:1fr 1.2fr;gap:22px;align-items:start}
  .chart-wrap{background:var(--bg-soft);border:1px solid var(--line);border-radius:10px;padding:14px 16px;}
  .chart-wrap .caption{font-size:10.5px;color:var(--muted);margin-top:8px;text-align:center}
  .chart-wrap h4{margin:0 0 10px;font-size:12.5px;text-transform:uppercase;letter-spacing:.06em;color:var(--p-900);}
  .chart-box{position:relative;width:100%;height:260px;}
  .chart-box.tall{height:300px;}
  .chart-box.short{height:210px;}
  canvas{max-width:100%;display:block;}

  /* Segment strip */
  .seg{display:flex;align-items:center;gap:12px;padding:10px 14px;background:var(--bg-soft);border-radius:8px;border:1px solid var(--line);margin:10px 0 14px}
  .seg .tag{background:var(--p-700);color:#fff;padding:2px 9px;border-radius:999px;font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
  .seg .tag.col{background:var(--col);color:#422006}
  .seg .tag.mex{background:var(--mex)}
  .seg h4{margin:0;font-size:14px;text-transform:none;letter-spacing:0;color:var(--ink);}
  .seg .meta{margin-left:auto;font-size:11.5px;color:var(--muted)}

  ul.clean{margin:8px 0;padding-left:18px;color:var(--ink2);font-size:13px;}
  ul.clean li{margin:4px 0}

  /* Assumption chips */
  .chips{display:flex;flex-wrap:wrap;gap:8px;margin:10px 0}
  .chips .chip{background:#fff;border:1px solid var(--line);border-radius:999px;padding:5px 12px;font-size:11.5px;color:var(--ink2);}
  .chips .chip strong{color:var(--p-700);margin-right:4px}

  footer{padding:20px 56px;background:var(--bg-soft);color:var(--muted);font-size:11px;border-top:1px solid var(--line);}

  @media print {
    body{background:#fff}
    .page{box-shadow:none;max-width:none}
    nav.tabs{display:none}
    .panel{display:block!important;page-break-before:always;padding:20px 32px;}
    .panel:first-of-type{page-break-before:auto}
    canvas{max-height:320px!important}
  }
</style>
</head>

  .auth-wrap { min-height:100vh; display:flex; align-items:center; justify-content:center; background:#f8f9ff; }
  .auth-card { background:#fff; border:1px solid #e0e1ff; border-radius:12px; padding:36px 40px; max-width:380px; width:90%; box-shadow:0 4px 24px rgba(99,102,241,0.08); }
  .auth-card h2 { font-size:18px; color:#0f0f1a; margin:0 0 6px; }

  .auth-card button { width:100%; margin-top:10px; padding:10px; background:#6366f1; color:#fff; border:none; border-radius:6px; font-size:14px; font-weight:600; cursor:pointer; }
  .auth-card button:hover { background:#4f46e5; }
  .auth-card .err { color:#dc2626; font-size:12px; margin-top:10px; min-height:16px; }
  .auth-card .footnote { font-size:10px; color:#9ca3af; margin-top:18px; line-height:1.5; }
</style>

async function decrypt(password) {
  const fromB64 = b => Uint8Array.from(atob(b), c => c.charCodeAt(0));
  const salt = fromB64(PAYLOAD.salt);
  const iv = fromB64(PAYLOAD.iv);
  const ct = fromB64(PAYLOAD.ct);
  const km = await crypto.subtle.importKey(
    'raw', new TextEncoder().encode(password), 'PBKDF2', false, ['deriveKey']
  );
  const key = await crypto.subtle.deriveKey(
    { name:'PBKDF2', salt, iterations:100000, hash:'SHA-256' },
    km, { name:'AES-GCM', length:256 }, false, ['decrypt']
  );
  const pt = await crypto.subtle.decrypt({ name:'AES-GCM', iv }, key, ct);
  return new TextDecoder().decode(pt);
}

async function unlock() {
  const pwd = document.getElementById('auth-pwd').value;
  const err = document.getElementById('auth-err');
  err.textContent = '';
  try {
    const html = await decrypt(pwd);
    document.querySelector('.auth-wrap').style.display = 'none';
    const mount = document.getElementById('content-mount');
    mount.innerHTML = html;
    mount.style.display = 'block';
    mount.querySelectorAll('script').forEach(old => {
      const s = document.createElement('script');
      if (old.src) s.src = old.src;
      else s.textContent = old.textContent;
      old.parentNode.replaceChild(s, old);
    });
    if (typeof updatePanel === 'function') {
      updatePanel();
    }
  } catch (e) {
    err.textContent = 'Incorrect password.';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('auth-pwd').addEventListener('keydown', e => {
    if (e.key === 'Enter') unlock();
  });
});
</script>
